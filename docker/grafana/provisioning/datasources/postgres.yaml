apiVersion: 1

datasources:
  # TomoriBot PostgreSQL Database
  - name: TomoriBot Database
    type: postgres
    access: proxy
    url: ${POSTGRES_HOST}:${POSTGRES_PORT}
    database: ${POSTGRES_DB}
    user: ${POSTGRES_USER}
    jsonData:
      sslmode: 'disable'  # Local Docker setup doesn't require SSL
      postgresVersion: 1500  # PostgreSQL 15+
      timescaledb: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    editable: true
    isDefault: true
