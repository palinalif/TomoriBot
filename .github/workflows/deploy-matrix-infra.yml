# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# GitHub Actions Workflow: Manage Matrix homeserver infrastructure via Terraform
# Covers: DigitalOcean droplet/firewall/volume + Cloudflare DNS/WAF
# State is stored in S3 (tomoribot-terraform-state / matrix-do/terraform.tfstate)

name: Deploy Matrix Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "terraform-do/**"
  pull_request:
    paths:
      - "terraform-do/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: false
        type: choice
        options:
          - plan
          - apply
        default: plan

# OIDC permissions for AWS authentication (needed for S3 state backend)
permissions:
  id-token: write
  contents: read
  pull-requests: write  # Allows posting plan output as PR comments

env:
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"
  # Sensitive Terraform variables injected from GitHub Secrets
  TF_VAR_digitalocean_token: ${{ secrets.DO_API_TOKEN }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CF_API_TOKEN }}
  # ssh_ingress_cidrs must be a JSON list: ["x.x.x.x/32"]
  TF_VAR_ssh_ingress_cidrs: ${{ secrets.DO_SSH_INGRESS_CIDRS }}

jobs:
  # PLAN — runs on every PR and every push to main
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exit_code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform-do
        run: terraform init

      - name: Terraform validate
        working-directory: terraform-do
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: terraform-do
        run: |
          set +e
          terraform plan \
            -input=false \
            -var-file=terraform.ci.tfvars \
            -detailed-exitcode \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          # Exit code 0 = no changes, 1 = error, 2 = changes present
          if [ $exit_code -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Guard against droplet destroy/replace
        working-directory: terraform-do
        run: |
          echo "Checking plan for destructive droplet changes..."
          if terraform show -json tfplan | jq -e '
            .resource_changes[]
            | select(.type == "digitalocean_droplet")
            | select(.change.actions | index("delete"))' >/dev/null 2>&1; then
            echo "ERROR: Plan would destroy or replace the Matrix droplet. Aborting."
            echo "Review terraform-do/matrix-homeserver.tf lifecycle settings."
            exit 1
          fi
          echo "No destructive droplet changes detected."

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform-do/plan_output.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ No changes' : exitCode === '2' ? '⚠️ Changes detected' : '❌ Error';

            const body = `## Matrix Infrastructure Plan — ${status}

            <details><summary>Terraform plan output</summary>

            \`\`\`
            ${planOutput.substring(0, 60000)}
            \`\`\`

            </details>

            *Triggered by \`${{ github.event_name }}\` on \`${{ github.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload plan artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-matrix-do
          path: terraform-do/tfplan
          retention-days: 1

  # APPLY — only runs on push to main (not PRs)
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    # Skip apply on PRs, and skip if plan shows no changes (exit code 0)
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform-do
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-matrix-do
          path: terraform-do

      - name: Terraform apply
        working-directory: terraform-do
        run: terraform apply -input=false -auto-approve tfplan
