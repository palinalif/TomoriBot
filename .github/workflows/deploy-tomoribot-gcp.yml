# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# GitHub Actions Workflow: Deploy TomoriBot to GCP Cloud Run
# Trigger: workflow_dispatch only until GCP is the primary deployment target.
# To cut over from AWS: add `push: branches: [main]` and remove it from deploy-tomoribot.yml.

name: Deploy TomoriBot (GCP)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        type: choice
        options:
          - test
          - production
        default: test
      create_db_backup:
        description: "Create a pre-deploy Cloud SQL backup"
        required: false
        type: boolean
        default: false

# OIDC permissions for GCP Workload Identity Federation
permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # ─── SECRETS VALIDATION ────────────────────────────────────────────────────

  validate-secrets:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate GCP deployment secrets
        run: |
          echo "=========================================="
          echo "Validating GitHub Secrets (GCP Infrastructure)"
          echo "=========================================="

          missing_secrets=()

          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ];                   then missing_secrets+=("GCP_PROJECT_ID"); fi
          if [ -z "${{ secrets.GCP_REGION }}" ];                        then missing_secrets+=("GCP_REGION"); fi
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ];    then missing_secrets+=("GCP_WORKLOAD_IDENTITY_PROVIDER"); fi
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT }}" ];               then missing_secrets+=("GCP_SERVICE_ACCOUNT"); fi
          if [ -z "${{ secrets.ARTIFACT_REGISTRY_REPO }}" ];            then missing_secrets+=("ARTIFACT_REGISTRY_REPO"); fi
          if [ -z "${{ secrets.CLOUD_SQL_INSTANCE_PASSWORD }}" ];       then missing_secrets+=("CLOUD_SQL_INSTANCE_PASSWORD"); fi
          if [ -z "${{ secrets.PAT_TOKEN }}" ];                         then missing_secrets+=("PAT_TOKEN"); fi

          if [ ${#missing_secrets[@]} -gt 0 ]; then
            echo "Missing required GCP secrets: ${missing_secrets[*]}"
            exit 1
          fi

          echo "================================================"
          echo "GCP Secrets: VALIDATED"
          echo "Application secrets: Mounted from GCP Secret Manager at runtime"
          echo "================================================"

  # ─── PARALLEL TESTING PHASE (identical to AWS workflow) ───────────────────

  test-lint:
    runs-on: ubuntu-24.04
    needs: validate-secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting and type checks
        run: |
          bun run lint
          bun run check

  test-locales:
    runs-on: ubuntu-24.04
    needs: validate-secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check localization keys
        run: |
          output=$(bun run check-locales 2>&1)
          exitCode=$?
          echo "$output"
          if echo "$output" | grep -q "MISSING LOCALIZATION KEYS"; then
            echo "Critical error: Missing localization keys found!"
            exit 1
          elif [ $exitCode -ne 0 ]; then
            echo "Localization warnings found, but no critical missing keys. Continuing..."
          fi

  test-schema:
    runs-on: ubuntu-24.04
    needs: validate-secrets
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check schema drift
        run: bun run check-schema

  test-lifecycle:
    runs-on: ubuntu-24.04
    needs: validate-secrets
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tomodb
          POSTGRES_USER: tomori
          POSTGRES_PASSWORD: tomori_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tomori -d tomodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: tomori
      POSTGRES_PASSWORD: tomori_ci_password
      POSTGRES_DB: tomodb
      CRYPTO_SECRET: ci_validation_crypto_secret
      RUN_ENV: development
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.2.12

      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check fresh database and maintenance scripts
        run: bun run validate:lifecycle

  # ─── BUILD DOCKER IMAGE (identical to AWS workflow) ───────────────────────

  build-image:
    runs-on: ubuntu-24.04
    needs: [test-lint, test-locales, test-schema, test-lifecycle]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download tokenizer assets for logit bias
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          bun run setup:tokenizers
          du -sh tokenizers/*/

      - name: Pre-download Python packages with platform-specific wheels
        run: |
          mkdir -p docker/pip-cache
          pip3 download \
            --dest docker/pip-cache \
            --platform musllinux_1_2_x86_64 \
            --platform musllinux_1_1_x86_64 \
            --python-version 3.12 \
            --implementation cp \
            --abi cp312 \
            --only-binary :all: \
            mcp-server-fetch==2025.4.7

      - name: Verify Python package checksums
        run: |
          cd docker/pip-cache
          sha256sum -c ../pip-checksums.txt

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag tomoribot:latest \
            --tag tomoribot:${{ github.sha }} \
            --load \
            .

      - name: Save Docker image
        run: docker save tomoribot:latest -o tomoribot-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: docker-image
          path: tomoribot-image.tar
          retention-days: 1

  # ─── SECURITY SCANNING (identical to AWS workflow) ────────────────────────

  security-sast:
    runs-on: ubuntu-24.04
    needs: build-image
    outputs:
      failed: ${{ steps.check-result.outputs.failed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Semgrep SAST scan
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: >-
            p/security-audit
            p/typescript
            p/docker
        continue-on-error: true
        id: semgrep

      - name: Check Semgrep results
        id: check-result
        run: |
          if [ "${{ steps.semgrep.outcome }}" == "failure" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

  security-dependencies:
    runs-on: ubuntu-24.04
    needs: build-image
    outputs:
      failed: ${{ steps.check-result.outputs.failed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun audit
        run: |
          if ! bun run audit:clean > audit-output.txt 2>&1; then
            cat audit-output.txt
            exit 1
          else
            cat audit-output.txt
          fi
        continue-on-error: true
        id: bun-audit

      - name: Check audit results
        id: check-result
        run: |
          if [ "${{ steps.bun-audit.outcome }}" == "failure" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

  security-secrets:
    runs-on: ubuntu-24.04
    needs: build-image
    outputs:
      failed: ${{ steps.check-result.outputs.failed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@99dc7bd6c06427bcb32f32fe1641d7fb83583915
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
        continue-on-error: true
        id: trufflehog

      - name: Check TruffleHog results
        id: check-result
        run: |
          if [ "${{ steps.trufflehog.outcome }}" == "failure" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

  security-container:
    runs-on: ubuntu-24.04
    needs: build-image
    outputs:
      failed: ${{ steps.check-result.outputs.failed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i tomoribot-image.tar

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: tomoribot:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
        continue-on-error: true
        id: trivy

      - name: Check Trivy results
        id: check-result
        run: |
          if [ "${{ steps.trivy.outcome }}" == "failure" ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

  security-gate:
    runs-on: ubuntu-24.04
    needs: [security-sast, security-dependencies, security-secrets, security-container]
    steps:
      - name: Check security scan results
        run: |
          echo "=========================================="
          echo "Security Gate - Evaluating Scan Results"
          echo "=========================================="

          failed=false

          echo "SAST Scan (Semgrep):           ${{ needs.security-sast.outputs.failed }}"
          echo "Dependency Scan (Bun Audit):   ${{ needs.security-dependencies.outputs.failed }}"
          echo "Secret Scan (TruffleHog):      ${{ needs.security-secrets.outputs.failed }}"
          echo "Container Scan (Trivy):        ${{ needs.security-container.outputs.failed }}"

          if [ "${{ needs.security-sast.outputs.failed }}" == "true" ];         then failed=true; fi
          if [ "${{ needs.security-dependencies.outputs.failed }}" == "true" ]; then failed=true; fi
          if [ "${{ needs.security-secrets.outputs.failed }}" == "true" ];      then failed=true; fi
          if [ "${{ needs.security-container.outputs.failed }}" == "true" ];    then failed=true; fi

          echo "=========================================="
          if [ "$failed" == "true" ]; then
            echo "DEPLOYMENT BLOCKED — security scans found issues"
            exit 1
          else
            echo "ALL SECURITY SCANS PASSED — proceeding to GCP deployment"
          fi

  # ─── GCP DEPLOYMENT ───────────────────────────────────────────────────────

  push-to-artifact-registry:
    runs-on: ubuntu-24.04
    needs: security-gate
    outputs:
      image_uri: ${{ steps.ar_uri.outputs.uri }}
      deploy: ${{ steps.ar_uri.outputs.deploy }}
      version: ${{ steps.package_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download Docker image artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i tomoribot-image.tar

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Get version from package.json
        id: package_version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: v$VERSION"

      - name: Check if version exists in Artifact Registry
        id: version_check
        env:
          AR_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VERSION: ${{ steps.package_version.outputs.version }}
        run: |
          if gcloud artifacts docker tags list "${AR_REPO}/tomoribot" \
            --project="${GCP_PROJECT_ID}" \
            --filter="tag=v${VERSION}" \
            --format="value(tag)" 2>/dev/null | grep -q "v${VERSION}"; then
            echo "version_exists=true" >> $GITHUB_OUTPUT
            echo "Version v$VERSION already exists in Artifact Registry — skipping deployment"
          else
            echo "version_exists=false" >> $GITHUB_OUTPUT
            echo "Version v$VERSION is new — will deploy"
          fi

      - name: Tag and push image to Artifact Registry
        id: ar_uri
        env:
          AR_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
          IMAGE_TAG: ${{ github.sha }}
          VERSION: ${{ steps.package_version.outputs.version }}
          VERSION_EXISTS: ${{ steps.version_check.outputs.version_exists }}
        run: |
          IMAGE_BASE="${AR_REPO}/tomoribot"

          # Always push commit hash tag
          docker tag tomoribot:latest "${IMAGE_BASE}:${IMAGE_TAG}"
          docker push "${IMAGE_BASE}:${IMAGE_TAG}"
          echo "Pushed commit hash tag: ${IMAGE_TAG}"

          # Always update latest tag
          docker tag tomoribot:latest "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:latest"
          echo "Updated 'latest' tag"

          if [ "$VERSION_EXISTS" = "false" ]; then
            docker tag tomoribot:latest "${IMAGE_BASE}:v${VERSION}"
            docker push "${IMAGE_BASE}:v${VERSION}"
            echo "Pushed version tag: v${VERSION}"
            echo "uri=${IMAGE_BASE}:v${VERSION}" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping version tag (already exists)"
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "uri=${IMAGE_BASE}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
          fi

  deploy-with-terraform:
    runs-on: ubuntu-24.04
    needs: push-to-artifact-registry
    if: needs['push-to-artifact-registry'].outputs.deploy == 'true'
    env:
      TF_VAR_container_image: ${{ needs['push-to-artifact-registry'].outputs.image_uri }}
      TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_db_password: ${{ secrets.CLOUD_SQL_INSTANCE_PASSWORD }}
      TF_IN_AUTOMATION: "1"
      TF_INPUT: "0"
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Optional Cloud SQL backup (manual or (Checkpoint) commit)
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.create_db_backup == true) ||
          (github.event_name == 'push' && contains(github.event.head_commit.message, '(Checkpoint)'))
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "Creating pre-deploy Cloud SQL backup..."
          gcloud sql backups create \
            --instance=tomoribot-db \
            --project="${GCP_PROJECT_ID}" \
            --description="pre-deploy-${{ github.run_id }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Terraform init
        working-directory: terraform/gcp
        run: terraform init

      - name: Terraform plan
        working-directory: terraform/gcp
        run: terraform plan -input=false -var-file=terraform.ci.tfvars -out=tfplan

      - name: Guard against Cloud SQL destroy/replace
        working-directory: terraform/gcp
        run: |
          echo "Checking plan for destructive Cloud SQL changes..."
          if terraform show -json tfplan | jq -e '.resource_changes[]
            | select(.type=="google_sql_database_instance")
            | select(.change.actions | index("delete"))' >/dev/null; then
            echo "Cloud SQL instance would be destroyed or replaced. Aborting deploy."
            exit 1
          fi
          echo "No destructive Cloud SQL changes detected."

      - name: Terraform apply
        working-directory: terraform/gcp
        run: terraform apply -input=false -auto-approve tfplan

  verify-cloud-run-deployment:
    runs-on: ubuntu-24.04
    needs: deploy-with-terraform
    outputs:
      deployment-status: ${{ steps.verify.outputs.status }}
      commit-hash: ${{ steps.commit-info.outputs.hash }}
      commit-message: ${{ steps.commit-info.outputs.message }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Get commit information
        id: commit-info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Wait for Cloud Run service to be ready
        id: verify
        run: |
          echo "Polling Cloud Run service for up to 10 minutes..."

          for i in $(seq 1 20); do
            READY=$(gcloud run services describe tomoribot \
              --region="${GCP_REGION}" \
              --project="${GCP_PROJECT_ID}" \
              --format=json 2>/dev/null \
              | jq -r '.status.conditions[] | select(.type=="Ready") | .status' 2>/dev/null \
              || echo "Unknown")

            if [ "$READY" = "True" ]; then
              echo "Cloud Run service is ready!"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Attempt $i/20: not ready yet (Ready=$READY), retrying in 30s..."
            sleep 30
          done

          echo "Cloud Run service did not become ready within 10 minutes."
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1

      - name: Check recent Cloud Logging output
        if: always()
        run: |
          echo "Fetching recent Cloud Run logs..."
          gcloud logging read \
            "resource.type=cloud_run_revision AND resource.labels.service_name=tomoribot" \
            --project="${GCP_PROJECT_ID}" \
            --limit=30 \
            --format="table(timestamp,severity,textPayload)" \
            || echo "No recent logs found (normal for new deployments)"

  # ─── GITHUB RELEASES (identical to AWS workflow) ──────────────────────────

  check-release-assets:
    runs-on: ubuntu-24.04
    needs: verify-cloud-run-deployment
    if: needs.verify-cloud-run-deployment.outputs.deployment-status == 'success'
    outputs:
      has-assets: ${{ steps.check.outputs.has-assets }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Get version from package.json
        id: version
        run: |
          echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Check if version-specific release folder exists
        id: check
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          versionFolder=".github/release/v$VERSION"
          if [ -d "$versionFolder" ]; then
            echo "has-assets=true" >> $GITHUB_OUTPUT
          else
            echo "has-assets=false" >> $GITHUB_OUTPUT
          fi

  create-release:
    runs-on: ubuntu-24.04
    needs: [verify-cloud-run-deployment, check-release-assets]
    if: needs.verify-cloud-run-deployment.outputs.deployment-status == 'success' && needs.check-release-assets.outputs.has-assets == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check if GitHub release already exists
        id: release-check
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          VERSION: ${{ needs.check-release-assets.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release notes and Discord notification
        id: release-notes
        if: steps.release-check.outputs.exists != 'true'
        env:
          VERSION: ${{ needs.check-release-assets.outputs.version }}
          COMMIT_HASH: ${{ needs.verify-cloud-run-deployment.outputs.commit-hash }}
        run: |
          versionFolder=".github/release/v$VERSION"
          releaseNotesPath=$(find "$versionFolder" -maxdepth 1 -name "*.md" ! -name "README.md" | head -n 1)

          if [ -z "$releaseNotesPath" ]; then
            echo "No .md files found in $versionFolder"
            exit 1
          fi

          imageName=$(find "$versionFolder" -maxdepth 1 -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.webp" \) | head -n 1 | xargs -r basename)

          releaseNotes=$(cat "$releaseNotesPath")
          releaseNotes="${releaseNotes//\{VERSION\}/$VERSION}"
          releaseNotes="${releaseNotes//\{TIMESTAMP\}/$(date -u +"%Y-%m-%d %H:%M:%S UTC")}"
          releaseNotes="${releaseNotes//\{COMMIT_HASH\}/$COMMIT_HASH}"
          releaseNotes="${releaseNotes//\{REPO_OWNER\}/${{ github.repository_owner }}}"
          releaseNotes="${releaseNotes//\{REPO_NAME\}/${{ github.event.repository.name }}}"

          echo "$releaseNotes" > processed-release-notes.md
          echo "image-name=$imageName" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.release-check.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          VERSION: ${{ needs.check-release-assets.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "TomoriBot v$VERSION" \
            --notes-file "processed-release-notes.md" \
            --latest

      - name: Send Discord notification
        if: steps.release-check.outputs.exists != 'true'
        env:
          STATUS: ${{ needs.verify-cloud-run-deployment.outputs.deployment-status }}
          VERSION: ${{ needs.check-release-assets.outputs.version }}
          IMAGE_NAME: ${{ steps.release-notes.outputs.image-name }}
          MENTION_ROLE_ID: ${{ secrets.RELEASE_DISCORD_MENTION_ROLE_ID }}
        run: |
          releaseNotes=$(cat processed-release-notes.md)
          releaseNotes=$(echo "$releaseNotes" | sed 's/!\[[^]]*\]([^)]*)//g')
          printf '%s' "$releaseNotes" > discord_release_notes.txt

          python3 .github/scripts/discord_split.py
          chunkCount=$(cat discord_chunk_count.txt)

          hasImage=false
          if [ -n "$IMAGE_NAME" ]; then
            imageUrl="https://github.com/${{ github.repository }}/raw/main/.github/release/v$VERSION/$IMAGE_NAME"
            if curl -sL --max-time 30 "$imageUrl" -o "release-post-image.png" && [ -s "release-post-image.png" ]; then
              hasImage=true
            fi
          fi

          discordWebhookUrl="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$discordWebhookUrl" ]; then
            echo "DISCORD_WEBHOOK_URL not configured — skipping Discord notification"
            exit 0
          fi

          threadTitle=$(head -1 processed-release-notes.md | sed 's/^# *//')
          firstChunk=$(cat discord_chunk_0.txt)

          if [ "$hasImage" = true ]; then
            firstPayload=$(jq -n --arg content "$firstChunk" --arg thread_name "$threadTitle" '{content: $content, thread_name: $thread_name}')
            response=$(curl -s -w "\n%{http_code}" -X POST -F "payload_json=$firstPayload" -F "files[0]=@release-post-image.png" "${discordWebhookUrl}?wait=true")
          else
            firstPayload=$(jq -n --arg content "$firstChunk" --arg thread_name "$threadTitle" '{content: $content, thread_name: $thread_name}')
            response=$(curl -s -w "\n%{http_code}" -X POST -H "Content-Type: application/json" -d "$firstPayload" "${discordWebhookUrl}?wait=true")
          fi

          httpCode=$(echo "$response" | tail -1)
          responseBody=$(echo "$response" | sed '$d')

          if [ "$httpCode" -lt 200 ] || [ "$httpCode" -ge 300 ]; then
            echo "Failed to create Discord forum post (HTTP $httpCode)"
            exit 1
          fi

          threadId=$(echo "$responseBody" | jq -r '.channel_id // empty')

          if [ "$chunkCount" -gt 1 ] && [ -n "$threadId" ]; then
            i=1
            while [ "$i" -lt "$chunkCount" ]; do
              chunk=$(cat "discord_chunk_${i}.txt")
              chunkPayload=$(jq -n --arg content "$chunk" '{content: $content}')
              curl -s -X POST -H "Content-Type: application/json" -d "$chunkPayload" "${discordWebhookUrl}?thread_id=${threadId}" >/dev/null
              i=$((i + 1))
              sleep 1
            done
          fi

          if [ -n "$MENTION_ROLE_ID" ] && [ -n "$threadId" ]; then
            mentionPayload=$(jq -n --arg content "<@&${MENTION_ROLE_ID}> Follow-up hotfixes or patches for this update will be posted in this Forum post!" '{content: $content}')
            curl -s -X POST -H "Content-Type: application/json" -d "$mentionPayload" "${discordWebhookUrl}?thread_id=${threadId}" >/dev/null
          fi

          echo "Discord notification complete!"
