name: Auto-assign PR Author

on:
  pull_request_target:
    types: [opened]

jobs:
  assign-and-track:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Assign PR author
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.payload.pull_request.user.login],
            });

      - name: Add to project and set Under Testing/Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const projectId = "PVT_kwHOA-NKoc4BW2Oz";
            const statusFieldId = "PVTSSF_lAHOA-NKoc4BW2OzzhSHQbE";
            const underReviewOptionId = "47fc9ee4";

            // 1. Add PR to the project board
            const addResult = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, {
              projectId,
              contentId: context.payload.pull_request.node_id,
            });

            const itemId = addResult.addProjectV2ItemById.item.id;

            // 2. Set status to Under Testing/Review
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId,
              itemId,
              fieldId: statusFieldId,
              optionId: underReviewOptionId,
            });
