name: Issue Assignment

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign commenter
        id: assign
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim();
            if (body !== "/assign-me") return;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;
            const issue = context.payload.issue;

            if (issue.state === "closed") {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `@${commenter} This issue is closed and cannot be assigned.`,
              });
              return;
            }

            const alreadyAssigned = issue.assignees.find(
              (a) => a.login !== commenter,
            );
            if (alreadyAssigned) {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `@${commenter} This issue is already assigned to @${alreadyAssigned.login}.`,
              });
              return;
            }

            await github.rest.issues.addAssignees({
              owner, repo, issue_number,
              assignees: [commenter],
            });

            core.setOutput("assigned", "true");

      - name: Move to In-Progress
        if: steps.assign.outputs.assigned == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECTS_TOKEN }}
          script: |
            const projectId = "PVT_kwHOA-NKoc4BW2Oz";
            const statusFieldId = "PVTSSF_lAHOA-NKoc4BW2OzzhSHQbE";
            const inProgressOptionId = "61e4505c";

            const result = await github.graphql(`
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `, { issueId: context.payload.issue.node_id });

            const projectItem = result.node.projectItems.nodes.find(
              (item) => item.project.id === projectId,
            );

            if (!projectItem) return;

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId,
                  itemId: $itemId,
                  fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId,
              itemId: projectItem.id,
              fieldId: statusFieldId,
              optionId: inProgressOptionId,
            });
